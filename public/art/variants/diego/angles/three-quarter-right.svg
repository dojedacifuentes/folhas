<style type="text/css"><![CDATA[
.fig{width:100%;height:auto;overflow:visible;}.fig-dani,.fig-diego{overflow:visible;isolation:isolate;}.cat-tail-group,.diego-tail-group,.akita-head,.cat-head,.akita-ear,.dani-body-group,.dani-head,.dani-ear,.dani-glasses,.dani-eyes,.dani-paw,.dani-bow,.diego-body-group,.diego-head,.diego-ear,.diego-glasses,.diego-eyes,.diego-paw,.diego-bow,.plant-leaf,.plant-leaf-shape,.plant-stem,.plant-sprout,.plant-sprout-leaf,.plant-waterline,.plant-bubble,.plant-state-face,.plant-recovery-mark,.cube-solid{transform-box:fill-box;transform-origin:center;}.cat-tail-group{transform-origin:center bottom;}.diego-tail-group{transform-origin:center bottom;}.akita-head{transform-origin:center bottom;}.dani-head,.diego-head,.dani-body-group,.diego-body-group,.dani-glasses,.diego-glasses,.dani-ear,.diego-ear,.dani-leg,.diego-leg,.dani-paw,.diego-paw,.dani-eye,.diego-eye{transition:transform 420ms cubic-bezier(0.33,0.02,0.2,1),opacity 220ms ease;}.dani-head{transform-origin:center bottom;}.dani-ear--left,.diego-ear--left{transform-origin:right bottom;}.dani-ear--right,.diego-ear--right{transform-origin:left bottom;}.dani-paw--front,.diego-paw--left{transform-origin:center right;}.diego-glasses,.dani-glasses{transform-origin:center;}.character--silhouette{color:#29291f;}.character--silhouette [data-part="ground-shadow"],.character--silhouette [data-detail]{display:none;}.character--silhouette [data-silhouette="true"]{fill:currentColor !important;stroke:currentColor !important;opacity:1 !important;}.character--small [data-detail="micro"],.character--small [data-part="whiskers"]{display:none;}.character--small .dani-glasses,.character--small .diego-glasses{stroke-width:3.25;}.character--small .dani-eye,.character--small .diego-eye{transform:scale(1.18);}.dani--profile .dani-head{transform:translate(-5px,1px) rotate(-7deg);}.dani--profile .dani-lens--far,.dani--profile .dani-eye--right,.dani--profile .dani-glasses-arm--right{opacity:0.32;}.diego--profile .diego-head{transform:translateX(-4px) rotate(-3deg);}.diego--profile .diego-lens--right,.diego--profile .diego-eye--right,.diego--profile .diego-glasses-arm--right{opacity:0.3;}.dani--curious .dani-head{transform:translate(-3px,-5px) rotate(-8deg);}.dani--curious .dani-leg--front,.dani--curious .dani-paw--front{transform:translate(-3px,-5px) rotate(-6deg);}.dani--curious .dani-tail-group{transform:rotate(7deg);}.dani--surprised .dani-head{transform:translateY(-7px) rotate(2deg);}.dani--surprised .dani-ear--left{transform:rotate(-13deg);}.dani--surprised .dani-ear--right{transform:rotate(12deg);}.dani--surprised .dani-eye{transform:scale(1.45);}.dani--surprised .dani-glasses{transform:translateY(-1px) scale(1.035);}.dani--hiding .dani-body-group{transform:translateY(11px) scaleY(0.9);}.dani--hiding .dani-head{transform:translate(8px,17px) rotate(-4deg);}.dani--hiding .dani-tail-group{transform:translateY(8px) rotate(-9deg);}.dani--hiding .dani-ground-shadow{transform:scaleX(0.82);transform-origin:center;}.dani--worried .dani-head{transform:translateY(5px) rotate(7deg);}.dani--worried .dani-ear--left{transform:rotate(17deg);}.dani--worried .dani-ear--right{transform:rotate(-14deg);}.dani--worried .dani-glasses{transform:translateY(2px) rotate(2deg);}.dani--delighted .dani-head{transform:translate(-1px,-4px) rotate(4deg);}.dani--delighted .dani-leg--front,.dani--delighted .dani-paw--front{transform:translate(-2px,-4px) rotate(-5deg);}.dani--delighted .dani-tail-group{transform:rotate(10deg);}.dani--delighted .dani-eye{transform:scaleY(0.72);}.dani--observing .dani-head{transform:translate(-4px,-2px) rotate(-11deg);}.dani--observing .dani-glasses{transform:translate(-1px,1px) scale(1.025);}.dani--observing .dani-body-group,.dani--observing .dani-tail-group{transform:rotate(-1.5deg);}.dani--sleeping,.cat--sleeping{transform:scaleY(0.94);transform-origin:bottom;}.dani--sleeping .dani-head,.cat--sleeping .dani-head{transform:translate(8px,12px) rotate(10deg);}.dani--sleeping .dani-eye,.cat--sleeping .dani-eye{transform:scaleY(0.18);}.dani--sleeping .dani-tail-group,.cat--sleeping .dani-tail-group{transform:translate(-5px,8px) rotate(-12deg);}.diego--serious .diego-head{transform:translateY(-2px);}.diego--serious .diego-brow--left{transform:rotate(3deg);}.diego--serious .diego-brow--right{transform:rotate(-3deg);}.diego--concerned .diego-head{transform:translateY(3px) rotate(-3deg);}.diego--concerned .diego-ear--left{transform:rotate(-17deg);}.diego--concerned .diego-ear--right{transform:rotate(16deg);}.diego--concerned .diego-glasses{transform:translateY(2px);}.diego--protecting .diego-body-group,.akita--guard .diego-body-group{transform:scaleX(1.055);}.diego--protecting .diego-head,.akita--guard .diego-head{transform:translateY(-4px) scale(1.015);}.diego--protecting .diego-paw--left,.akita--guard .diego-paw--left{transform:translateX(-4px);}.diego--protecting .diego-paw--right,.akita--guard .diego-paw--right{transform:translateX(4px);}.diego--embarrassed .diego-head{transform:translateY(5px) rotate(6deg);}.diego--embarrassed .diego-ear--left{transform:rotate(14deg);}.diego--embarrassed .diego-ear--right{transform:rotate(-19deg);}.diego--embarrassed .diego-glasses{transform:translateY(4px) rotate(3deg);}.diego--recoveringGlasses .diego-glasses,.diego--recovering-glasses .diego-glasses{transform:translate(-8px,8px) rotate(-11deg);}.diego--recoveringGlasses .diego-paw--left,.diego--recovering-glasses .diego-paw--left{transform:translate(12px,-20px) rotate(-21deg);}.diego--recoveringGlasses .diego-head,.diego--recovering-glasses .diego-head{transform:rotate(-4deg);}.diego--proud .diego-body-group{transform:scaleX(1.035) translateY(-1px);}.diego--proud .diego-head{transform:translateY(-5px) rotate(1.5deg);}.diego--proud .diego-ear--left{transform:rotate(-4deg);}.diego--proud .diego-ear--right{transform:rotate(4deg);}.diego--proud .diego-chest{opacity:1;}.character--size-small{width:4.5rem;}.character--size-medium{width:8.5rem;}.character--size-large{width:12rem;}.character--interactive{cursor:pointer;touch-action:manipulation;border-radius:0.25rem;}.character--interactive:focus-visible{outline:2px solid #29291f;outline-offset:4px;}.character--interactive:hover .dani-glasses,.character--interactive:hover .diego-glasses{transform:translateY(-1px);}.character--reduced-motion,.character--reduced-motion *,.character--reduced-motion *::before,.character--reduced-motion *::after{animation:none !important;scroll-behavior:auto !important;transition-duration:0.01ms !important;}.dani--profile .dani-head,.diego--profile .diego-head{transform:none;}.dani--profile .dani-lens--near,.diego--profile .diego-lens--left{opacity:1;}.dani-sleep-eye,.dani-worry-brows,.diego-blush{opacity:0;transition:opacity 220ms ease;}.dani--sleeping .dani-eye,.cat--sleeping .dani-eye{opacity:0;}.dani--sleeping .dani-sleep-eye,.cat--sleeping .dani-sleep-eye,.dani--worried .dani-worry-brows,.diego--embarrassed .diego-blush{opacity:1;}.dani--idle:not(.character--reduced-motion) .dani-tail-group{animation:tailFlick 12s ease-in-out infinite;}.diego--idle:not(.character--reduced-motion) .diego-ear--right{animation:earTwitch 16s ease-in-out infinite;}.dani--curious .dani-bow{transform:translateY(-2px) rotate(-2deg);}.dani--surprised .dani-mouth{stroke-width:1.8;}.diego--serious .diego-bow,.diego--focused .diego-bow,.diego--protecting .diego-bow{transform:translateY(-2px);}.diego--concerned .diego-brow--left{transform:rotate(-7deg);}.diego--concerned .diego-brow--right{transform:rotate(7deg);}.dani--happy .dani-head{transform:translateY(-4px) rotate(4deg);}.dani--happy .dani-eye{transform:scaleY(0.72);}.dani--happy .dani-tail-group{transform:rotate(10deg);}.dani--proud .dani-head{transform:translateY(-6px) rotate(-2deg);}.dani--proud .dani-bow{transform:translateY(-3px) scale(1.04);}.dani--watering .dani-head{transform:translate(-3px,3px) rotate(-8deg);}.dani--watering .dani-leg--front,.dani--watering .dani-paw--front{transform:translate(8px,-9px) rotate(-14deg);}.dani--watching .dani-head{transform:translate(-4px,-2px) rotate(-10deg);}.dani--watching .dani-glasses{transform:translate(-1px,1px) scale(1.025);}.dani--reactingToRain .dani-head{transform:translateY(5px) rotate(-4deg);}.dani--reactingToRain .dani-ear--left,.dani--reactingToRain .dani-ear--right{transform:rotate(10deg);}.dani--reactingToRain .dani-tail-group{transform:translateY(6px) rotate(-8deg);}.dani--reactingToWind .dani-head{transform:translate(5px,1px) rotate(8deg);}.dani--reactingToWind .dani-glasses{transform:translate(5px,-2px) rotate(6deg);}.dani--reactingToWind .dani-tail-group{transform:rotate(16deg);}.dani--reactingToHeat .dani-body-group{transform:translateY(5px) scaleY(0.96);}.dani--reactingToHeat .dani-head{transform:translateY(7px) rotate(5deg);}.dani--reactingToHeat .dani-ear--left{transform:rotate(14deg);}.dani--reactingToHeat .dani-ear--right{transform:rotate(-14deg);}.diego--focused .diego-head{transform:translateY(-2px);}.diego--focused .diego-brow--left{transform:rotate(3deg);}.diego--focused .diego-brow--right{transform:rotate(-3deg);}.diego--happy .diego-head{transform:translateY(-4px) rotate(2deg);}.diego--happy .diego-tail-group{transform:rotate(8deg);}.diego--surprised .diego-head{transform:translateY(-6px);}.diego--surprised .diego-ear--left{transform:rotate(-11deg);}.diego--surprised .diego-ear--right{transform:rotate(11deg);}.diego--surprised .diego-eye{transform:scale(1.38);}.diego--planting .diego-head{transform:translate(-3px,5px) rotate(-7deg);}.diego--planting .diego-paw--left{transform:translate(10px,-14px) rotate(-16deg);}.diego--watching .diego-head{transform:translate(-2px,1px) rotate(-4deg);}.diego--watching .diego-glasses{transform:translateY(1px);}.diego--recoveringGlasses .diego-glasses{transform:translate(-8px,8px) rotate(-11deg);}.diego--reactingToRain .diego-body-group{transform:translateY(3px);}.diego--reactingToRain .diego-head{transform:translateY(4px) rotate(-2deg);}.diego--reactingToRain .diego-ear--left,.diego--reactingToRain .diego-ear--right{transform:rotate(8deg);}.diego--reactingToWind .diego-head{transform:translate(4px,1px) rotate(5deg);}.diego--reactingToWind .diego-glasses{transform:translate(9px,-5px) rotate(9deg);}.diego--reactingToWind .diego-ear--right{transform:rotate(18deg);}.diego--reactingToHeat .diego-body-group{transform:translateY(4px) scaleY(0.98);}.diego--reactingToHeat .diego-head{transform:translateY(6px);}.diego--reactingToHeat .diego-ear--left{transform:rotate(13deg);}.diego--reactingToHeat .diego-ear--right{transform:rotate(-13deg);}@media (prefers-reduced-motion:reduce){.fig-dani *,.fig-diego *{animation:none !important;transition-duration:0.01ms !important;}}
]]></style>

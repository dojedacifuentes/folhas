 rotate(-3deg);}.diego--profile .diego-lens--right,.diego--profile .diego-eye--right,.diego--profile .diego-glasses-arm--right{opacity:0.3;}.dani--curious .dani-head{transform:translate(-3px,-5px) rotate(-8deg);}.dani--curious .dani-leg--front,.dani--curious .dani-paw--front{transform:translate(-3px,-5px) rotate(-6deg);}.dani--curious .dani-tail-group{transform:rotate(7deg);}.dani--surprised .dani-head{transform:translateY(-7px) rotate(2deg);}.dani--surprised .dani-ear--left{transform:rotate(-13deg);}.dani--surprised .dani-ear--right{transform:rotate(12deg);}.dani--surprised .dani-eye{transform:scale(1.45);}.dani--surprised .dani-glasses{transform:translateY(-1px) scale(1.035);}.dani--hiding .dani-body-group{transform:translateY(11px) scaleY(0.9);}.dani--hiding .dani-head{transform:translate(8px,17px) rotate(-4deg);}.dani--hiding .dani-tail-group{transform:translateY(8px) rotate(-9deg);}.dani--hiding .dani-ground-shadow{transform:scaleX(0.82);transform-origin:center;}.dani--worried .dani-head{transform:translateY(5px) rotate(7deg);}.dani--worried .dani-ear--left{transform:rotate(17deg);}.dani--worried .dani-ear--right{transform:rotate(-14deg);}.dani--worried .dani-glasses{transform:translateY(2px) rotate(2deg);}.dani--delighted .dani-head{transform:translate(-1px,-4px) rotate(4deg);}.dani--delighted .dani-leg--front,.dani--delighted .dani-paw--front{transform:translate(-2px,-4px) rotate(-5deg);}.dani--delighted .dani-tail-group{transform:rotate(10deg);}.dani--delighted .dani-eye{transform:scaleY(0.72);}.dani--observing .dani-head{transform:translate(-4px,-2px) rotate(-11deg);}.dani--observing .dani-glasses{transform:translate(-1px,1px) scale(1.025);}.dani--observing .dani-body-group,.dani--observing .dani-tail-group{transform:rotate(-1.5deg);}.dani--sleeping,.cat--sleeping{transform:scaleY(0.94);transform-origin:bottom;}.dani--sleeping .dani-head,.cat--sleeping .dani-head{transform:translate(8px,12px) rotate(10deg);}.dani--sleeping .dani-eye,.cat--sleeping .dani-eye{transform:scaleY(0.18);}.dani--sleeping .dani-tail-group,.cat--sleeping .dani-tail-group{transform:translate(-5px,8px) rotate(-12deg);}.diego--serious .diego-head{transform:translateY(-2px);}.diego--serious .diego-brow--left{transform:rotate(3deg);}.diego--serious .diego-brow--right{transform:rotate(-3deg);}.diego--concerned .diego-head{transform:translateY(3px) rotate(-3deg);}.diego--concerned .diego-ear--left{transform:rotate(-17deg);}.diego--concerned .diego-ear--right{transform:rotate(16deg);}.diego--concerned .diego-glasses{transform:translateY(2px);}.diego--protecting .diego-body-group,.akita--guard .diego-body-group{transform:scaleX(1.055);}.diego--protecting .diego-head,.akita--guard .diego-head{transform:translateY(-4px) scale(1.015);}.diego--protecting .diego-paw--left,.akita--guard .diego-paw--left{transform:translateX(-4px);}.diego--protecting .diego-paw--right,.akita--guard .diego-paw--right{transform:translateX(4px);}.diego--embarrassed .diego-head{transform:translateY(5px) rotate(6deg);}.diego--embarrassed .diego-ear--left{transform:rotate(14deg);}.diego--embarrassed .diego-ear--right{transform:rotate(-19deg);}.diego--embarrassed .diego-glasses{transform:translateY(4px) rotate(3deg);}.diego--recoveringGlasses .diego-glasses,.diego--recovering-glasses .diego-glasses{transform:translate(-8px,8px) rotate(-11deg);}.diego--recoveringGlasses .diego-paw--left,.diego--recovering-glasses .diego-paw--left{transform:translate(12px,-20px) rotate(-21deg);}.diego--recoveringGlasses .diego-head,.diego--recovering-glasses .diego-head{transform:rotate(-4deg);}.diego--proud .diego-body-group{transform:scaleX(1.035) translateY(-1px);}.diego--proud .diego-head{transform:translateY(-5px) rotate(1.5deg);}.diego--proud .diego-ear--left{transform:rotate(-4deg);}.diego--proud .diego-ear--right{transform:rotate(4deg);}.diego--proud .diego-chest{opacity:1;}.character--size-small{width:4.5rem;}.character--size-medium{width:8.5rem;}.character--size-large{width:12rem;}.character-
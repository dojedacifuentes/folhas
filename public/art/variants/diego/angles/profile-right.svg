 .dani-head{transform:translate(-4px,-2px) rotate(-10deg);}.dani--watching .dani-glasses{transform:translate(-1px,1px) scale(1.025);}.dani--reactingToRain .dani-head{transform:translateY(5px) rotate(-4deg);}.dani--reactingToRain .dani-ear--left,.dani--reactingToRain .dani-ear--right{transform:rotate(10deg);}.dani--reactingToRain .dani-tail-group{transform:translateY(6px) rotate(-8deg);}.dani--reactingToWind .dani-head{transform:translate(5px,1px) rotate(8deg);}.dani--reactingToWind .dani-glasses{transform:translate(5px,-2px) rotate(6deg);}.dani--reactingToWind .dani-tail-group{transform:rotate(16deg);}.dani--reactingToHeat .dani-body-group{transform:translateY(5px) scaleY(0.96);}.dani--reactingToHeat .dani-head{transform:translateY(7px) rotate(5deg);}.dani--reactingToHeat .dani-ear--left{transform:rotate(14deg);}.dani--reactingToHeat .dani-ear--right{transform:rotate(-14deg);}.diego--focused .diego-head{transform:translateY(-2px);}.diego--focused .diego-brow--left{transform:rotate(3deg);}.diego--focused .diego-brow--right{transform:rotate(-3deg);}.diego--happy .diego-head{transform:translateY(-4px) rotate(2deg);}.diego--happy .diego-tail-group{transform:rotate(8deg);}.diego--surprised .diego-head{transform:translateY(-6px);}.diego--surprised .diego-ear--left{transform:rotate(-11deg);}.diego--surprised .diego-ear--right{transform:rotate(11deg);}.diego--surprised .diego-eye{transform:scale(1.38);}.diego--planting .diego-head{transform:translate(-3px,5px) rotate(-7deg);}.diego--planting .diego-paw--left{transform:translate(10px,-14px) rotate(-16deg);}.diego--watching .diego-head{transform:translate(-2px,1px) rotate(-4deg);}.diego--watching .diego-glasses{transform:translateY(1px);}.diego--recoveringGlasses .diego-glasses{transform:translate(-8px,8px) rotate(-11deg);}.diego--reactingToRain .diego-body-group{transform:translateY(3px);}.diego--reactingToRain .diego-head{transform:translateY(4px) rotate(-2deg);}.diego--reactingToRain .diego-ear--left,.diego--reactingToRain .diego-ear--right{transform:rotate(8deg);}.diego--reactingToWind .diego-head{transform:translate(4px,1px) rotate(5deg);}.diego--reactingToWind .diego-glasses{transform:translate(9px,-5px) rotate(9deg);}.diego--reactingToWind .diego-ear--right{transform:rotate(18deg);}.diego--reactingToHeat .diego-body-group{transform:translateY(4px) scaleY(0.98);}.diego--reactingToHeat .diego-head{transform:translateY(6px);}.diego--reactingToHeat .diego-ear--left{transform:rotate(13deg);}.diego--reactingToHeat .diego-ear--right{transform:rotate(-13deg);}@media (prefers-reduced-motion:reduce){.fig-dani *,.fig-diego *{animation:none !important;transition-duration:0.01ms !important;}}
